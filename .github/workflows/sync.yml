name: 同步 Notion 資料到班網

on:
  workflow_dispatch:        # 老師手動按「Run workflow」立即更新
  repository_dispatch:      # iOS 捷徑／API 一鍵觸發（event_type: sync-now）
    types: [sync-now]
  schedule:
    # 台灣時間 07:00 / 16:00 / 20:00（UTC+8）
    - cron: "0 23 * * *"
    - cron: "0 8 * * *"
    - cron: "0 12 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 同步 Notion 資料
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node scripts/sync-notion.mjs

      - name: 同步 Google 日曆
        run: node scripts/sync-gcal.mjs

      - name: 同步 Drive 相簿
        env:
          DRIVE_API_KEY: ${{ secrets.DRIVE_API_KEY }}
        run: node scripts/sync-drive.mjs

      - name: 提交更新
        run: |
          git config user.name "class-website-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "資料沒有變化，不需要更新"
          else
            git commit -m "同步班網資料 $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')"
            git push
          fi
